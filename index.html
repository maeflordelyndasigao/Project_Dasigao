<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro RPS Game</title>
    <link rel="stylesheet" href="rps.css">
</head>
<body>

    <div class="game-container">
        <h1> ROCK <span class="vs">VS</span> PAPER <span class="vs">VS</span> SCISSORS</h1>
        
        <div class="scoreboard">
            <div class="score-card">
                <p>PLAYER</p>
                <span id="player-score">0</span>
            </div>
            <div class="score-card">
                <p>COMPUTER</p>
                <span id="computer-score">0</span>
            </div>
        </div>

        <div class="battle-field">
            <div class="result" id="result"> READY? </div>
        </div>

        <div class="controls">
            <button class="choice-btn" onclick="playGame('rock')">👊<span>ROCK</span></button>
            <button class="choice-btn" onclick="playGame('paper')">✋<span>PAPER</span></button>
            <button class="choice-btn" onclick="playGame('scissors')">✌️<span>SCISSORS</span></button>
        </div>

        <button id="restart-btn" onclick="restartGame()">🔄 RESET GAME</button>
    </div>

    <script src="rps.js"></script>
</body>
</html>
